<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Your SOAR Password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

  .box {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.10);
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
  }

  h2 { text-align: center; color: #1f3d3a; font-size: 24px; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 28px; }

  .form { display: flex; flex-direction: column; gap: 14px; }
  input { padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #1f3d3a; }

  button {
    background: #1f3d3a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  button:hover { background: #2d5550; }

  .message { text-align: center; font-size: 13px; margin-top: 8px; min-height: 20px; color: #c0392b; }
  .message.success { color: #1f3d3a; }

  .back-link { text-align: center; margin-top: 20px; font-size: 13px; }
  .back-link a { color: #1f3d3a; text-decoration: none; font-weight: bold; }
  .back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="box">
  <h2>S.O.A.R.</h2>
  <p class="subtitle">Reset Your Password</p>

  <div class="form" id="reset-form">
    <input type="password" id="new-password" placeholder="Enter new password (min 6 chars)" />
    <input type="password" id="confirm-password" placeholder="Confirm new password" />
    <button onclick="resetPassword()">Update Password</button>
    <div class="message" id="message"></div>
  </div>

  <div class="back-link" id="back-link" style="display:none;">
    <a href="https://melaniejager-soar.github.io/soar-checklists/soar-week1.html">← Go to Week 1 Checklist</a>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://ctcrkjikdudaioyasohq.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0Y3JramlrZHVkYWlveWFzb2hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzM3MTEsImV4cCI6MjA5NzIwOTcxMX0.62OUsz_EuGFZBXdCZrBuH2Flv67g4rQdAn34eGj0d78";

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function resetPassword() {
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const msg = document.getElementById('message');

    if (!newPassword || !confirmPassword) {
      msg.textContent = 'Please fill in both fields.';
      msg.className = 'message';
      return;
    }

    if (newPassword !== confirmPassword) {
      msg.textContent = 'Passwords do not match. Please try again.';
      msg.className = 'message';
      return;
    }

    if (newPassword.length < 6) {
      msg.textContent = 'Password must be at least 6 characters.';
      msg.className = 'message';
      return;
    }

    msg.textContent = 'Updating your password...';
    msg.className = 'message';

    const { error } = await sb.auth.updateUser({ password: newPassword });

    if (error) {
      msg.textContent = error.message;
      msg.className = 'message';
    } else {
      msg.textContent = '✓ Password updated successfully! You can now sign in.';
      msg.className = 'message success';
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('back-link').style.display = 'block';
    }
  }
</script>
</body>
</html>
