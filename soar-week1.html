<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOAR Week 1 Checklist</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
  }

  /* ── Auth Screen ── */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .auth-box {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.10);
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
  }

  .auth-box h2 {
    text-align: center;
    color: #1f3d3a;
    font-size: 24px;
    margin-bottom: 6px;
  }

  .auth-box .auth-subtitle {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 28px;
  }

  .auth-tabs {
    display: flex;
    border-bottom: 2px solid #e8e8e8;
    margin-bottom: 24px;
  }

  .auth-tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    cursor: pointer;
    font-size: 15px;
    color: #888;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }

  .auth-tab.active {
    color: #1f3d3a;
    font-weight: bold;
    border-bottom-color: #1f3d3a;
  }

  .auth-form { display: flex; flex-direction: column; gap: 14px; }

  .auth-form input {
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .auth-form input:focus { border-color: #1f3d3a; }

  .auth-btn {
    background: #1f3d3a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }

  .auth-btn:hover { background: #2d5550; }

  .auth-message {
    text-align: center;
    font-size: 13px;
    margin-top: 8px;
    min-height: 20px;
    color: #c0392b;
  }

  .auth-message.success { color: #1f3d3a; }

  /* ── Checklist Screen ── */
  #checklist-screen { display: none; padding: 24px; }

  .checklist-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 850px;
    margin: 0 auto 16px;
    font-size: 13px;
    color: #666;
  }

  .user-info { display: flex; align-items: center; gap: 10px; }

  .signout-btn {
    background: none;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    color: #555;
    transition: all 0.2s;
  }

  .signout-btn:hover { border-color: #1f3d3a; color: #1f3d3a; }

  #soar-checklist {
    font-family: Arial, sans-serif;
    max-width: 850px;
    margin: auto;
    padding: 24px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    color: #1f1f1f;
  }

  #soar-checklist h2 {
    text-align: center;
    font-size: 30px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .subtitle {
    text-align: center;
    font-size: 15px;
    margin-bottom: 24px;
    color: #666;
  }

  .progress-wrapper {
    background: #e8e8e8;
    border-radius: 30px;
    overflow: hidden;
    height: 24px;
    margin-bottom: 10px;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: #1f3d3a;
    color: white;
    text-align: center;
    line-height: 24px;
    font-size: 13px;
    transition: width 0.3s ease;
  }

  .progress-text {
    text-align: center;
    font-size: 14px;
    margin-bottom: 24px;
    color: #444;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid #eeeeee;
    font-size: 16px;
    line-height: 1.45;
  }

  .task input {
    margin-top: 4px;
    transform: scale(1.25);
    cursor: pointer;
  }

  .task.completed label {
    text-decoration: line-through;
    color: #777;
  }

  .completed-badge {
    display: none;
    margin-left: 8px;
    font-size: 12px;
    color: #1f3d3a;
    font-weight: bold;
  }

  .task.completed .completed-badge { display: inline; }

  .saving-indicator {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-top: 16px;
    min-height: 18px;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h2>S.O.A.R.</h2>
    <p class="auth-subtitle">Week 1 Checklist — Sign in to track your progress</p>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showTab('signin')">Sign In</div>
      <div class="auth-tab" onclick="showTab('signup')">Create Account</div>
    </div>

    <!-- Sign In -->
    <div id="signin-form" class="auth-form">
      <input type="email" id="signin-email" placeholder="Email address" />
      <input type="password" id="signin-password" placeholder="Password" />
      <button class="auth-btn" onclick="signIn()">Sign In</button>
      <div class="auth-message" id="signin-msg"></div>
    </div>

    <!-- Sign Up -->
    <div id="signup-form" class="auth-form" style="display:none;">
      <input type="text" id="signup-name" placeholder="Your full name" />
      <input type="email" id="signup-email" placeholder="Email address" />
      <input type="password" id="signup-password" placeholder="Create a password (min 6 chars)" />
      <button class="auth-btn" onclick="signUp()">Create Account</button>
      <div class="auth-message" id="signup-msg"></div>
    </div>
  </div>
</div>

<!-- CHECKLIST SCREEN -->
<div id="checklist-screen">
  <div class="checklist-header">
    <div class="user-info">👋 Welcome, <span id="user-email-display"></span></div>
    <button class="signout-btn" onclick="signOut()">Sign Out</button>
  </div>

  <div id="soar-checklist">
    <h2>SOAR Week 1 Checklist</h2>
    <div class="subtitle">Complete each step as you begin building your eXp foundation.</div>

    <div class="progress-wrapper">
      <div class="progress-bar" id="progressBar">0%</div>
    </div>
    <div class="progress-text" id="progressText">0 of 13 tasks completed</div>

    <div class="task"><input type="checkbox" id="task1"><label for="task1">If you are new to your MLS, contact your REALTOR® association and sign up for your MLS and lockbox classes. <strong>(buttons below)</strong><span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task2"><label for="task2">Need a headshot? Only if needed, get a headshot that is high resolution and looks polished and professional.<span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task3"><label for="task3">Access and familiarize yourself with the eXp branding guide. <strong>(button below)</strong><span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task4"><label for="task4">Go to my.exprealty.com, then navigate to Knowledge Base → OKTA Home → Build-A-Sign → Agent Starter Kit FAQ and order yours.<span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task5"><label for="task5">If you do not already have a business email account and signature block, set yours up on Google. <strong>(button below)</strong><span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task6"><label for="task6">Choose your FREE CRM — BoldTrail is highly recommended. <strong>(button below)</strong><span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task7"><label for="task7">Set up your account in your CRM and familiarize yourself with the system.<span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task8"><label for="task8">Enter 100 contacts in your CRM with full name, email, phone, and mailing address — think past clients, friends, family, colleagues, and community connections. <strong>(Power 100 Guide below)</strong><span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task9"><label for="task9">Set up your FREE Forewarn account. <strong>(PDF below)</strong><span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task10"><label for="task10">Set up your FREE Regus Office Account. <strong>(button below)</strong><span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task11"><label for="task11">Register to complete a Live Start-Up Session by choosing an available day and time. <strong>(button below)</strong><span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task12"><label for="task12">Download the eXp Toolkits app on your phone from the app store.<span class="completed-badge"> ✓ Done</span></label></div>
    <div class="task"><input type="checkbox" id="task13"><label for="task13">Use the ACCOUNTABILITY EMAIL to share a progress update. <strong>(button below)</strong><span class="completed-badge"> ✓ Done</span></label></div>

    <div class="saving-indicator" id="savingIndicator"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://ctcrkjikdudaioyasohq.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0Y3JramlrZHVkYWlveWFzb2hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzM3MTEsImV4cCI6MjA5NzIwOTcxMX0.62OUsz_EuGFZBXdCZrBuH2Flv67g4rQdAn34eGj0d78";
  const WEEK = "week1";

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;

  // ── Tab switching ──
  function showTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'signin') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('signin-form').style.display = tab === 'signin' ? 'flex' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'flex' : 'none';
  }

  // ── Auth ──
  async function signUp() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const msg = document.getElementById('signup-msg');

    if (!name || !email || !password) { msg.textContent = 'Please fill in all fields.'; return; }

    msg.textContent = 'Creating your account...';
    msg.className = 'auth-message';

    const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });

    if (error) { msg.textContent = error.message; }
    else { msg.className = 'auth-message success'; msg.textContent = 'Account created! Check your email to confirm, then sign in.'; }
  }

  async function signIn() {
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    const msg = document.getElementById('signin-msg');

    if (!email || !password) { msg.textContent = 'Please enter your email and password.'; return; }

    msg.textContent = 'Signing in...';
    msg.className = 'auth-message';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) { msg.textContent = error.message; }
    else { loadChecklist(data.user); }
  }

  async function signOut() {
    await sb.auth.signOut();
    currentUser = null;
    document.getElementById('checklist-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('signin-msg').textContent = '';
    document.getElementById('signin-email').value = '';
    document.getElementById('signin-password').value = '';
  }

  // ── Load checklist with saved progress ──
  async function loadChecklist(user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('checklist-screen').style.display = 'block';
    document.getElementById('user-email-display').textContent = user.user_metadata?.full_name || user.email;

    const { data, error } = await sb
      .from('checklist_progress')
      .select('task_id, completed')
      .eq('user_id', user.id)
      .eq('week', WEEK);

    const saved = {};
    if (data) data.forEach(row => { saved[row.task_id] = row.completed; });

    const checkboxes = document.querySelectorAll('#soar-checklist input[type="checkbox"]');
    checkboxes.forEach(box => {
      if (saved[box.id] === true) {
        box.checked = true;
        box.closest('.task').classList.add('completed');
      }
      box.addEventListener('change', () => saveProgress(box, user.id));
    });

    updateProgress();
  }

  // ── Save single task to Supabase ──
  async function saveProgress(box, userId) {
    const task = box.closest('.task');
    if (box.checked) task.classList.add('completed');
    else task.classList.remove('completed');

    updateProgress();
    showSaving('Saving...');

    const { error } = await sb.from('checklist_progress').upsert({
      user_id: userId,
      week: WEEK,
      task_id: box.id,
      completed: box.checked,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,week,task_id' });

    showSaving(error ? '⚠️ Could not save. Check your connection.' : '✓ Progress saved', !error);
    setTimeout(() => showSaving(''), 2000);
  }

  function showSaving(msg, success = false) {
    const el = document.getElementById('savingIndicator');
    el.textContent = msg;
    el.style.color = success ? '#1f3d3a' : '#999';
  }

  function updateProgress() {
    const checkboxes = document.querySelectorAll('#soar-checklist input[type="checkbox"]');
    let completed = 0;
    checkboxes.forEach(box => { if (box.checked) completed++; });
    const total = checkboxes.length;
    const percent = Math.round((completed / total) * 100);
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('progressBar').textContent = percent + '%';
    document.getElementById('progressText').textContent = completed + ' of ' + total + ' tasks completed';
  }

  // ── Check for existing session on load ──
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session?.user) loadChecklist(session.user);
  });
</script>
</body>
</html>
